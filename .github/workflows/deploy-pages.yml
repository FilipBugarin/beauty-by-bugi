name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Prepare static files
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html styles.css script.js dist/
          cp -r assets dist/

      - name: Install Wrangler
        run: npm install --global wrangler@4.76.0

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 8ca94ec9373030a8ed2cf2f8231814e5
        run: wrangler pages deploy dist --project-name=beauty-by-bugi --branch main
